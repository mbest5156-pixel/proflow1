<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProFlow Plumbing Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background-color: #ffffff; color: #1a1a1a; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 50px auto; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #0066cc; margin-bottom: 20px; }
        p { font-size: 18px; margin-bottom: 20px; color: #475569; }
        .btn { display: inline-block; padding: 12px 24px; background: #ef4444; color: white; text-decoration: none; border-radius: 25px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <!-- العنوان الديناميكي الذي سيُجلب من لوحة التحكم -->
        <h1 id="heroTitleElement">Loading...</h1>
        <p>Proudly Serving: <span id="addressTextElement">Loading...</span></p>
        <a href="#" id="phoneLink" class="btn">📞 Call Now: <span id="phoneText">Loading...</span></a>
    </div>

    <script>
        // كود جلب البيانات واختبارها
        fetch('/data.json')
            .then(response => {
                if (!response.ok) throw new Error('File not found');
                return response.json();
            })
            .then(data => {
                document.getElementById('heroTitleElement').textContent = data.hero_title || "Plumbing Services";
                document.getElementById('addressTextElement').textContent = data.address || "Morocco";
                document.getElementById('phoneText').textContent = data.phone_number || "0000";
                document.getElementById('phoneLink').href = "tel:" + data.phone_number;
            })
            .catch(error => {
                console.error("Error:", error);
                document.getElementById('heroTitleElement').textContent = "Welcome to ProFlow Plumbing";
            });
    </script>
</body>
</html>
