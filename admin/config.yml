backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "settings"
    label: "⚙️ إعدادات الموقع"
    files:
      - name: "general"
        label: "معلومات الاتصال"
        file: "data/settings.json"
        fields:
          - { label: "رقم الهاتف", name: "phone", widget: "string" }
          - { label: "رقم WhatsApp", name: "whatsapp", widget: "string" }
          - { label: "البريد الإلكتروني", name: "email", widget: "string" }

      - name: "hero"
        label: "🎯 القسم الرئيسي"
        file: "data/hero.json"
        fields:
          - { label: "العنوان الكبير", name: "title", widget: "string" }
          - { label: "النص الوصفي", name: "description", widget: "text" }
