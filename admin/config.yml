backend:
  name: git-gateway
  branch: main

site_url: https://scintillating-froyo-b6fa3a.netlify.app

local_backend: true

media_folder: "images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "إعدادات الموقع"
    delete: false
    editor:
      preview: false
    files:
      - name: "general"
        label: "البيانات الأساسية للموقع"
        file: "data.json" # هنا جعلنا الحفظ يتم داخل ملف بيانات نظيف
        fields:
          - { label: "رقم الهاتف المباشر", name: "phone_number", widget: "string", hint: "اكتب الرقم مع رمز الدولة مثل +2126000000" }
          - { label: "عنوان مقر العمل", name: "address", widget: "string", hint: "مثال: Ouled Teima, Morocco" }
          - { label: "العنوان الرئيسي الكبير (Hero Title)", name: "hero_title", widget: "string", hint: "العنوان العريض الذي يظهر في بداية الموقع" }

